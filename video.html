<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video | LeftLane</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="site-shell">
        <header class="topbar">
            <a class="brand" href="index.html">LeftLane</a>
            <nav class="topnav" aria-label="Hauptnavigation">
                <a class="navlink" href="index.html">Start</a>
                <a class="navlink" href="autos.html">Autos</a>
                <a class="navlink" href="galerie.html">Galerie</a>
                <a class="navlink navlink--active" href="video.html">Video</a>
                <a class="navlink" href="ueber-uns.html">Über uns</a>
            </nav>
        </header>

        <main>
            <section class="hero">
                <div class="hero__copy">
                    <p class="eyebrow">Video</p>
                    <h1>Ein eingebettetes Video im gleichen Look</h1>
                    <p class="hero__text">Der Videobereich bleibt dunkel, klar und großzügig. Das Einbettungsfeld nimmt den Fokus auf und passt zum restlichen Seitenaufbau.</p>
                    <div class="hero__actions">
                        <a class="button button--primary" href="index.html">Zur Startseite</a>
                        <a class="button button--ghost" href="galerie.html">Zur Galerie</a>
                    </div>
                </div>

                <div class="hero__visual" aria-label="Video Platzhalter">
                    <div class="hero__visual-label">YouTube Fokus</div>
                </div>
            </section>

            <section class="panel panel--video">
                <div class="section__header">
                    <p class="eyebrow">YouTube</p>
                    <h2>Video-Einbettung</h2>
                </div>

                <div class="youtube-embed">
                    <iframe
                        src="https://www.youtube.com/embed/dQw4w9WgXcQ"
                        title="YouTube video player"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        allowfullscreen>
                    </iframe>
                </div>
            </section>
        </main>
    </div>
    <button class="scroll-to-top" id="scrollToTop" aria-label="Nach oben scrollen">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 10 7 2 15"></polyline>
        </svg>
    </button>
    <script src="script.js"></script>
</body>
</html>
