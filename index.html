<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeftLane Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="hero">
        <div class="hero__content">
            <p class="eyebrow">LeftLane</p>
            <h1>Starke visuelle Struktur für deine Website</h1>
            <p class="hero__text">Oben ein großes Banner mit Video-Platzhalter, darunter eine Bild-Slideshow und weiter unten ein eingebettetes YouTube-Video.</p>
        </div>
        <div class="hero__video-placeholder" aria-label="Platzhalter für Banner-Video">
            <span>Banner-Video Platzhalter</span>
        </div>
    </header>

    <main class="page">
        <section class="section">
            <div class="section__header">
                <p class="eyebrow">Slideshow</p>
                <h2>Bildbereich</h2>
            </div>

            <div class="slideshow" aria-label="Bild-Slideshow Platzhalter">
                <article class="slide slide--active">Bild 01</article>
                <article class="slide">Bild 02</article>
                <article class="slide">Bild 03</article>
            </div>
        </section>

        <section class="section section--video">
            <div class="section__header">
                <p class="eyebrow">YouTube</p>
                <h2>Video-Einbettung</h2>
            </div>

            <div class="youtube-embed">
                <iframe
                    src="https://www.youtube.com/embed/dQw4w9WgXcQ"
                    title="YouTube video player"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    allowfullscreen>
                </iframe>
            </div>
        </section>
    </main>
</body>
</html>
